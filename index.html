<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNDR | Memory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=STIX+Two+Text:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        alabaster: '#F7F5F0',
                        charcoal: '#2C2C2A',
                        sage: '#8C9A8E',
                        ochre: '#D9B48F'
                    },
                    fontFamily: {
                        serif: ['"STIX Two Text"', 'serif'],
                        sans: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F7F5F0; 
            color: #2C2C2A;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        main {
            pointer-events: none;
        }

        .text-display {
            font-size: clamp(2.5rem, 6vw, 5rem);
            line-height: 1.1;
            letter-spacing: -0.01em;
        }

        ::selection {
            background: #8C9A8E;
            color: #F7F5F0;
        }
    </style>
</head>
<body class="font-sans">

    <!-- Reset Button -->
    <div class="fixed top-6 right-6 md:top-12 md:right-12 z-50 pointer-events-auto">
        <button id="reset-btn" class="font-sans text-xs uppercase tracking-widest text-charcoal/40 hover:text-charcoal transition-colors duration-500">
            Reset
        </button>
    </div>

    <div id="canvas-container"></div>

    <main class="relative w-full z-10">
        
        <section class="relative w-full h-screen flex flex-col justify-end items-start p-8 md:p-16">
            <div class="max-w-sm pb-8 gs-fade">
                <p class="font-serif italic text-sage text-sm mb-4">01 &mdash; Concept.</p>
                <p class="font-sans text-lg md:text-xl font-medium leading-relaxed">
                    Touch the screen to mold the surface.<br>
                    The fluid physics stops, and your mark hold its shape.
                </p>
            </div>
        </section>

        <section class="relative w-full min-h-[120vh] flex flex-col justify-center items-end p-8 md:p-16">
            <div class="w-full max-w-xl text-right gs-fade">
                <h2 class="font-serif text-display text-charcoal mb-8">
                    People usually forget.
                </h2>
                <p class="font-sans text-lg md:text-xl leading-relaxed">
                    We build so they don't.
                </p>
            </div>
        </section>

        <section class="relative w-full h-screen flex items-center justify-start p-8 md:p-16">
            <div class="max-w-2xl gs-fade">
                <p class="font-serif text-3xl md:text-4xl leading-snug">
                    Good design speaks for itself. It does work that words won't.
                </p>
                <p class="mt-16 font-sans text-xs uppercase tracking-widest text-sage font-medium">
                    BNDR LLC
                </p>
            </div>
        </section>

    </main>

    <script>
        // --- THREE.JS: THE FLAWLESS GPU SIMULATION ---
        // We eliminate 8-bit banding by using a 16-bit Float Framebuffer Object (FBO).
        // We inject a finite-difference equation to calculate mathematically perfect normals.

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#F7F5F0'); 

        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- THE MEMORY MAP (16-BIT FLOAT FBO PING-PONG) ---
        // This entirely eliminates the stair-stepping (banding) seen on standard canvases.
        const mapSize = 1024;
        const rtOptions = {
            minFilter: THREE.LinearFilter,
            magFilter: THREE.LinearFilter,
            format: THREE.RGBAFormat,
            type: THREE.HalfFloatType, // 16-bit float precision
            depthBuffer: false,
            wrapS: THREE.ClampToEdgeWrapping,
            wrapT: THREE.ClampToEdgeWrapping
        };
        
        let rtA = new THREE.WebGLRenderTarget(mapSize, mapSize, rtOptions);
        let rtB = new THREE.WebGLRenderTarget(mapSize, mapSize, rtOptions);
        
        // Clear both initially
        renderer.setRenderTarget(rtA); renderer.clear();
        renderer.setRenderTarget(rtB); renderer.clear();
        renderer.setRenderTarget(null);

        // FBO Drawing Scene
        const fboScene = new THREE.Scene();
        const fboCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const fboMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTexture: { value: null },
                uBrushPos: { value: new THREE.Vector2(-1, -1) },
                uBrushLastPos: { value: new THREE.Vector2(-1, -1) },
                uBrushRadius: { value: 0.045 } // Buttery wide brush
            },
            vertexShader: `
                varying vec2 vUv;
                void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
            `,
            fragmentShader: `
                uniform sampler2D uTexture;
                uniform vec2 uBrushPos;
                uniform vec2 uBrushLastPos;
                uniform float uBrushRadius;
                varying vec2 vUv;

                // Continuous line distance for flawless unbroken strokes regardless of mouse speed
                float lineDist(vec2 p, vec2 a, vec2 b) {
                    vec2 pa = p - a, ba = b - a;
                    float ba2 = dot(ba, ba);
                    if (ba2 < 0.000001) return length(pa);
                    float h = clamp(dot(pa, ba) / ba2, 0.0, 1.0);
                    return length(pa - ba * h);
                }

                void main() {
                    float mem = texture2D(uTexture, vUv).r;
                    
                    if (uBrushPos.x >= 0.0) {
                        float d = lineDist(vUv, uBrushLastPos, uBrushPos);
                        // Deep cubic smoothstep for absolutely flawless falloff
                        float influence = smoothstep(uBrushRadius, uBrushRadius * 0.1, d);
                        mem = min(1.0, mem + influence * 0.4); 
                    }
                    
                    gl_FragColor = vec4(mem, 0.0, 0.0, 1.0);
                }
            `
        });
        fboScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fboMaterial));

        // --- HIGH RESOLUTION GRID ---
        const segmentsX = 300;
        const segmentsY = 300;
        const planeWidth = 60;
        const planeHeight = 60;
        const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight, segmentsX, segmentsY);
        
        // --- LUXURY MATERIAL & SHADER INJECTION ---
        const material = new THREE.MeshPhysicalMaterial({
            color: 0xF7F5F0,
            roughness: 0.35, // Dropped slightly for a wetter, buttery look
            metalness: 0.15,
            clearcoat: 0.8,  // High clearcoat catches the mathematically perfect normals
            clearcoatRoughness: 0.2,
            side: THREE.DoubleSide,
            displacementMap: rtA.texture, // Bound strictly to inform the built-in shadow map generator
            displacementScale: -1.8
        });

        // The core fix: Recalculate surface normals on the fly so lighting isn't broken/faceted
        material.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = { value: 0 };
            shader.uniforms.uMemory = { value: null };
            material.userData.shader = shader; 
            
            shader.vertexShader = `
                uniform float uTime;
                uniform sampler2D uMemory;
                
                // Master height equation
                float getHeight(vec2 uv, vec2 pos) {
                    float mem = texture2D(uMemory, uv).r;
                    // Ease the memory impact mathematically
                    float smoothMem = smoothstep(0.0, 1.0, mem); 
                    
                    float wave = sin(pos.x * 0.4 + pos.y * 0.4 + uTime * 1.0) * 0.3;
                    return wave * (1.0 - smoothMem) - (smoothMem * 1.8);
                }
            ` + shader.vertexShader;
            
            // Replace normal calculation using finite-differences
            shader.vertexShader = shader.vertexShader.replace(
                '#include <beginnormal_vertex>',
                `
                vec3 p0 = position;
                float h0 = getHeight(uv, p0.xy);
                
                float eps = 0.05; // Delta offset
                vec2 uv1 = uv + vec2(eps / 60.0, 0.0); // 60.0 is plane width
                vec2 uv2 = uv + vec2(0.0, eps / 60.0);
                
                vec3 p1 = p0 + vec3(eps, 0.0, 0.0);
                vec3 p2 = p0 + vec3(0.0, eps, 0.0);
                
                p1.z = getHeight(uv1, p1.xy);
                p2.z = getHeight(uv2, p2.xy);
                
                vec3 tangent = p1 - vec3(p0.xy, h0);
                vec3 bitangent = p2 - vec3(p0.xy, h0);
                
                // This ensures the light perfectly traces the curve without facets
                vec3 objectNormal = normalize(cross(tangent, bitangent));
                `
            );

            // Apply the actual vertex position change
            shader.vertexShader = shader.vertexShader.replace(
                '#include <begin_vertex>',
                `
                vec3 transformed = vec3(position.xy, h0);
                `
            );
        };

        const plane = new THREE.Mesh(geometry, material);
        plane.receiveShadow = true;
        plane.castShadow = true;
        scene.add(plane);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x8C9A8E, 1.2);
        dirLight.position.set(-10, 10, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const fillLight = new THREE.PointLight(0xD9B48F, 0.8, 50);
        fillLight.position.set(15, -10, 5);
        scene.add(fillLight);

        // --- HARDWARE INTERACTION LOGIC (MOBILE OPTIMIZED) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-9999, -9999);
        const lastUv = new THREE.Vector2(-1, -1);
        let isPointerDown = false;

        function applyBrush(uv) {
            if (lastUv.x === -1) lastUv.copy(uv);
            
            fboMaterial.uniforms.uTexture.value = rtA.texture;
            fboMaterial.uniforms.uBrushPos.value.copy(uv);
            fboMaterial.uniforms.uBrushLastPos.value.copy(lastUv);
            
            renderer.setRenderTarget(rtB);
            renderer.render(fboScene, fboCamera);
            renderer.setRenderTarget(null);
            
            let temp = rtA;
            rtA = rtB;
            rtB = temp;
            
            lastUv.copy(uv);
        }

        function handleInteract(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                applyBrush(intersects[0].uv);
            } else {
                lastUv.set(-1, -1);
            }
        }

        // Desktop Mouse Events
        window.addEventListener('mousedown', (e) => {
            isPointerDown = true;
            handleInteract(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => {
            if (!isPointerDown) return;
            handleInteract(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => {
            isPointerDown = false;
            lastUv.set(-1, -1);
        });
        window.addEventListener('mouseleave', () => {
            isPointerDown = false;
            lastUv.set(-1, -1);
        });

        // Mobile Touch Events (Passive listeners allow perfect native scrolling while drawing)
        window.addEventListener('touchstart', (e) => {
            isPointerDown = true;
            handleInteract(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        
        window.addEventListener('touchmove', (e) => {
            if (!isPointerDown) return;
            handleInteract(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        
        window.addEventListener('touchend', () => {
            isPointerDown = false;
            lastUv.set(-1, -1);
        }, { passive: true });
        
        window.addEventListener('touchcancel', () => {
            isPointerDown = false;
            lastUv.set(-1, -1);
        }, { passive: true });

        // --- RESET LOGIC ---
        document.getElementById('reset-btn').addEventListener('click', () => {
            const currentClearColor = renderer.getClearColor(new THREE.Color());
            const currentClearAlpha = renderer.getClearAlpha();
            
            // Clear FBOs back to zero memory
            renderer.setClearColor(0x000000, 1.0);
            renderer.setRenderTarget(rtA); renderer.clear();
            renderer.setRenderTarget(rtB); renderer.clear();
            
            // Restore actual scene background
            renderer.setClearColor(currentClearColor, currentClearAlpha);
            renderer.setRenderTarget(null);
            
            // Reset coordinates to prevent snap-drawing
            fboMaterial.uniforms.uBrushPos.value.set(-1, -1);
            fboMaterial.uniforms.uBrushLastPos.value.set(-1, -1);
            lastUv.set(-1, -1);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            if (material.userData.shader) {
                material.userData.shader.uniforms.uTime.value = clock.getElapsedTime();
                material.userData.shader.uniforms.uMemory.value = rtA.texture;
                material.displacementMap = rtA.texture; // Keep shadow map accurate
            }

            camera.position.y = -(window.scrollY * 0.003);
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        // --- DOM PACING LOGIC ---
        window.onload = () => {
            animate();

            gsap.registerPlugin(ScrollTrigger);

            const fades = document.querySelectorAll('.gs-fade');
            fades.forEach((el) => {
                gsap.fromTo(el, 
                    { opacity: 0, y: 30 },
                    {
                        opacity: 1, 
                        y: 0, 
                        duration: 1.2, 
                        ease: "power2.out",
                        scrollTrigger: {
                            trigger: el,
                            start: "top 85%",
                            toggleActions: "play none none reverse"
                        }
                    }
                );
            });
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
